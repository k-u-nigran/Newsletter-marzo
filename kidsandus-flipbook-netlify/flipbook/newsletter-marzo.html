<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Newsletter Marzo | Kids&Us Nigrán</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f4f4;
text-align:center;
}

header{
background:white;
padding:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h1{
margin:0;
}

#viewer{
width:95%;
max-width:900px;
margin:40px auto;
}

canvas{
width:100%;
margin-bottom:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
border-radius:10px;
}

.download{
display:inline-block;
margin-top:10px;
padding:12px 22px;
background:#ff6b8a;
color:white;
text-decoration:none;
border-radius:30px;
font-weight:bold;
}

</style>
</head>

<body>

<header>

<h1>Newsletter Marzo</h1>
<p>Kids&Us Nigrán</p>

<a class="download" href="/public/pdf/newsletter-marzo-kidsandus-nigran.pdf" target="_blank">
Descargar PDF
</a>

</header>

<div id="viewer"></div>

<script>

const url = "/public/pdf/newsletter-marzo-kidsandus-nigran.pdf";

let pdfjsLib = window['pdfjs-dist/build/pdf'];

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

pdfjsLib.getDocument(url).promise.then(function(pdf) {

for(let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++){

pdf.getPage(pageNumber).then(function(page){

let scale = 1.5;
let viewport = page.getViewport({scale: scale});

let canvas = document.createElement("canvas");
let context = canvas.getContext("2d");

canvas.height = viewport.height;
canvas.width = viewport.width;

document.getElementById("viewer").appendChild(canvas);

page.render({
canvasContext: context,
viewport: viewport
});

});

}

});

</script>

</body>
</html>
